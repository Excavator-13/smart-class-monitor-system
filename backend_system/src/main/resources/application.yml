server:
  port: 8080

spring:
  # MySQL 数据源配置
  datasource:
    url: jdbc:mysql://39.106.209.208:3306/appdb?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: appuser
    password: MySQL@186strongpass3435
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 5000
      maximum-pool-size: 10
      minimum-idle: 2

  # Jackson 序列化配置
  jackson:
    property-naming-strategy: SNAKE_CASE
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

# MyBatis 配置
mybatis:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# JWT 鉴权配置
auth:
  jwt:
    secret: smart-class-monitor-system-jwt-secret-key-2026
    expiration-hours: 24

# Flask AI 服务
ai:
  base-url: http://39.106.209.208:5000
  connect-timeout-ms: 3000
  read-timeout-ms: 10000
  # AI 内部接口鉴权 Token（生产环境通过环境变量覆盖）
  internal-token: smart-class-ai-internal-token-2026

# Nginx RTMP 状态页
nginx:
  stat-url: http://39.106.209.208:9092/stat

# springdoc-openapi (Swagger) 配置 —— 分组由 SwaggerConfig.java 的 GroupedOpenApi Bean 定义
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
