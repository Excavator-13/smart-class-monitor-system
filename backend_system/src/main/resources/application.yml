server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/appdb?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 5000
      maximum-pool-size: 10
      minimum-idle: 2

  sql:
    init:
      mode: always
      schema-locations: classpath:sql/schema.sql
      continue-on-error: false

  # Jackson 序列化配置
  jackson:
    property-naming-strategy: SNAKE_CASE
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

# MyBatis 配置
mybatis:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# JWT 鉴权配置
auth:
  jwt:
    secret: ${AUTH_JWT_SECRET:smart-class-monitor-system-jwt-secret-key-2026-dev-only}
    expiration-hours: ${AUTH_JWT_EXPIRATION_HOURS:24}

# Flask AI 服务
ai:
  base-url: ${AI_BASE_URL:http://localhost:5000}
  connect-timeout-ms: ${AI_CONNECT_TIMEOUT_MS:3000}
  read-timeout-ms: ${AI_READ_TIMEOUT_MS:10000}
  internal-token: ${AI_INTERNAL_TOKEN:smart-class-ai-internal-token-2026-dev-only}

# Nginx RTMP 状态页
nginx:
  stat-url: ${NGINX_STAT_URL:http://localhost:9092/stat}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}

# AI 日报配置
report:
  qwen:
    url: ${QWEN_API_URL:https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions}
    key: ${QWEN_API_KEY:}
    model: ${QWEN_MODEL:qwen3.7-plus}
  ai-enabled: ${REPORT_AI_ENABLED:true}
  snapshot-base-url: ${SNAPSHOT_BASE_URL:http://39.106.209.208:9092}
  data-dir: ${REPORT_DATA_DIR:data/reports}

# springdoc-openapi (Swagger) 配置 —— 分组由 SwaggerConfig.java 的 GroupedOpenApi Bean 定义
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
