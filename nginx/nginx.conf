user root;
worker_processes 2;

error_log logs/error.log;
error_log logs/error.log info;

events {
    worker_connections 1024;
}

rtmp_auto_push on;

rtmp {
    server {
        listen 9090;
        application live {
            live on;
            record all;
            record_unique on;
            record_path "/usr/local/rtmp_video";
            record_suffix -%Y-%m-%d-%H_%M_%S.flv;
            exec_publish bash /opt/scripts/start_segment.sh $name;
            exec_publish_done bash /opt/scripts/stop_segment.sh $name;
        }
    }
}

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        location / {
            root /var/www/html;
            index index.html;
        }
        location /api {
            proxy_pass http://127.0.0.1:5000;
        }
    }

    server {
        listen 9092;
        server_name localhost;
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
        if ($request_method = 'OPTIONS') { return 204; }
        location /stat {
                rtmp_stat all;
        }
        location /snapshots/ {
            alias /data/snapshots/;
            autoindex off;
        }
        location /records/ {
            alias /usr/local/rtmp_video/segments/;
            autoindex off;
        }
        location / {
            root /usr/local/rtmp_video;
            autoindex on;
            autoindex_exact_size off;
            autoindex_localtime on;
            charset utf-8;
        }
    }

    server {
        listen 9091;
        server_name localhost;
        location / {
            root html;
            index index.html index.htm;

        }
    }
    server { listen 8089; location / { root /data; autoindex on; } }
}